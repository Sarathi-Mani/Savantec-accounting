# Nginx reverse proxy: savantec-erp-api.sellfiz.com -> localhost:6768
# Requests to the website are forwarded to your app on port 6768.
# Place in /etc/nginx/sites-available/ and symlink from sites-enabled.

server {
    listen 80;
    listen [::]:80;

    server_name savantec-erp-api.sellfiz.com;

    location / {
        proxy_pass http://127.0.0.1:6768;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
